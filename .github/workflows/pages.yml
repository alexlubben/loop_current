name: Deploy to GitHub Pages

# Publishes the static site (index.html at the repo root) to GitHub Pages.
# Runs on pushes to this branch and can be triggered manually.
#
# NOTE: the current field is a FIXED HYCOM-TSIS 2010 reanalysis snapshot
# (data/gulf-currents.json, see README "Current data snapshot"). The workflow
# therefore deploys the committed data as-is; it does NOT fetch/overwrite it,
# and there is no daily schedule, so the snapshot is stable.
on:
  push:
    branches:
      - claude/vigilant-bardeen-49708v
    paths-ignore:
      # The job commits a refreshed poster; ignore it so that commit doesn't
      # retrigger the workflow.
      - "poster.png"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Render poster from the committed snapshot
        # Render poster.png from the committed (static) current data and commit
        # it back so the social/preview image matches the map. paths-ignore
        # above prevents this commit from retriggering the workflow.
        run: |
          npm install --no-save sharp >/dev/null 2>&1 || true
          node tools/render-preview.js > /tmp/preview.svg
          node -e "require('sharp')('/tmp/preview.svg').resize(1200).png().toFile('poster.png').then(i=>console.log('poster',i.width+'x'+i.height))" || echo "::warning::poster render skipped"
          # node_modules was only needed to render the poster; keep it out of the deploy.
          rm -rf node_modules package-lock.json
          # Commit the poster if it changed (the current data itself is static).
          git add -- poster.png 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Update poster [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Actions source) if it isn't enabled yet.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
